<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Loopless Font Master — Thai Reading Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1b2433;
    --paper:#f5f1e8;
    --card:#ffffff;
    --line:#e3ddcd;
    --teal:#0f8a7d;
    --teal-dk:#0a6359;
    --coral:#e7543f;
    --gold:#e0a92e;
    --muted:#7d8597;
    --good:#0f8a7d;
    --good-bg:#e3f4f0;
    --bad:#e7543f;
    --bad-bg:#fce8e4;
    --shadow:0 10px 30px rgba(27,36,51,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Sarabun',system-ui,sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, #fbf7ee 0%, transparent 60%),
      var(--paper);
    color:var(--ink);
    min-height:100dvh;
    display:flex;align-items:flex-start;justify-content:center;
    padding:18px 16px 40px;
  }
  .wrap{width:100%;max-width:480px}

  /* Header */
  header{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:18px;
  }
  .brand{display:flex;flex-direction:column;line-height:1}
  .brand .eyebrow{
    font-family:'Prompt',sans-serif;font-weight:600;font-size:11px;
    letter-spacing:.22em;text-transform:uppercase;color:var(--teal-dk);
  }
  .brand .ttl{
    font-family:'Prompt',sans-serif;font-weight:600;font-size:17px;
    margin-top:5px;color:var(--ink);
  }
  .badge{
    font-family:'Prompt',sans-serif;font-weight:600;font-size:10px;
    letter-spacing:.03em;
    color:var(--teal-dk);background:#fff;border:1px solid var(--line);
    padding:7px 11px;border-radius:999px;white-space:nowrap;
  }

  /* Stats bar */
  .stats{
    display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;
  }
  .stat{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:11px 10px;text-align:center;
  }
  .stat .k{
    font-family:'Prompt',sans-serif;font-size:10px;font-weight:600;
    letter-spacing:.14em;text-transform:uppercase;color:var(--muted);
  }
  .stat .v{
    font-family:'Prompt',sans-serif;font-weight:700;font-size:22px;margin-top:3px;
  }
  .stat .v small{font-size:13px;color:var(--muted);font-weight:500}
  #streakStat .v{color:var(--gold)}
  #scoreStat .v{color:var(--teal)}

  /* progress */
  .track{height:6px;background:#e9e3d4;border-radius:999px;overflow:hidden;margin-bottom:20px}
  .track > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--gold));transition:width .35s ease}

  /* Question card */
  .qcard{
    background:var(--card);border:1px solid var(--line);border-radius:22px;
    box-shadow:var(--shadow);padding:26px 22px 22px;text-align:center;
    position:relative;overflow:hidden;
  }
  .qcard::before{
    content:"";position:absolute;inset:0 0 auto 0;height:5px;
    background:linear-gradient(90deg,var(--teal),var(--gold),var(--coral));
  }
  .prompt-label{
    font-family:'Prompt',sans-serif;font-weight:500;font-size:12px;
    letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
    margin-bottom:14px;
  }
  .thai{
    font-family:'Prompt',sans-serif;font-weight:500;
    font-size:clamp(40px,12vw,60px);line-height:1.15;color:var(--ink);
    word-break:break-word;margin:4px 0 6px;
  }
  .jp-hint{
    font-size:13px;color:var(--muted);min-height:18px;margin-bottom:4px;
    opacity:0;transition:opacity .25s;
  }
  .jp-hint.show{opacity:1}

  /* Choices */
  .choices{display:flex;flex-direction:column;gap:11px;margin-top:20px}
  .choice{
    font-family:'Prompt',sans-serif;font-weight:500;font-size:19px;
    background:#fff;border:1.6px solid var(--line);border-radius:14px;
    padding:15px 16px;cursor:pointer;text-align:left;
    display:flex;align-items:center;gap:12px;
    transition:border-color .15s, background .15s, transform .06s;
  }
  .choice:active{transform:scale(.99)}
  .choice .ctxt{flex:1 1 auto}
  .choice .looped{
    flex:0 0 auto;font-family:'Sarabun',sans-serif;font-weight:500;
    font-size:23px;line-height:1;color:inherit;
    max-width:0;opacity:0;overflow:hidden;white-space:nowrap;
    transition:max-width .3s ease, opacity .25s ease, margin .3s ease;
    margin-left:0;padding-left:0;
  }
  .choice .looped.show{
    max-width:160px;opacity:1;margin-left:10px;padding-left:12px;
    border-left:1.5px dashed currentColor;
  }
  .choice.correct .looped{color:var(--good-dk,#0a6359)}
  .choice.wrong .looped{color:var(--bad)}
  .choice .dot{
    width:24px;height:24px;border-radius:50%;flex:0 0 auto;
    border:1.6px solid var(--line);display:grid;place-items:center;
    font-size:12px;font-weight:700;color:var(--muted);
    font-family:'Prompt',sans-serif;
  }
  .choice:hover:not(.locked){border-color:var(--teal)}
  .choice.correct{background:var(--good-bg);border-color:var(--good)}
  .choice.correct .dot{background:var(--good);border-color:var(--good);color:#fff}
  .choice.wrong{background:var(--bad-bg);border-color:var(--bad)}
  .choice.wrong .dot{background:var(--bad);border-color:var(--bad);color:#fff}
  .choice.locked{cursor:default}
  .choice.dim{opacity:.5}

  /* feedback + next */
  .feedback{
    margin-top:16px;min-height:24px;font-size:14px;text-align:center;
    font-weight:600;opacity:0;transition:opacity .2s;
  }
  .feedback.show{opacity:1}
  .feedback.ok{color:var(--good)}
  .feedback.no{color:var(--bad)}
  .feedback .ans{font-family:'Prompt',sans-serif}
  .feedback .fb-th{font-family:'Sarabun',sans-serif;font-weight:600;font-size:18px;margin-left:4px}
  .feedback.ok .fb-th{color:var(--good-dk,#0a6359)}
  .feedback.no .fb-th{color:var(--bad)}

  .next{
    width:100%;margin-top:16px;border:none;cursor:pointer;
    font-family:'Prompt',sans-serif;font-weight:600;font-size:16px;
    color:#fff;background:var(--teal);border-radius:14px;padding:15px;
    transition:background .15s, opacity .15s;
  }
  .next:hover{background:var(--teal-dk)}
  .next:disabled{opacity:.4;cursor:not-allowed}

  /* Result screen */
  .result{
    background:var(--card);border:1px solid var(--line);border-radius:22px;
    box-shadow:var(--shadow);padding:30px 24px;text-align:center;
  }
  .result h2{
    font-family:'Prompt',sans-serif;font-weight:600;font-size:20px;margin-bottom:6px;
  }
  .result .big{
    font-family:'Prompt',sans-serif;font-weight:700;
    font-size:56px;line-height:1;margin:14px 0 2px;color:var(--teal);
  }
  .result .pct{font-family:'Prompt',sans-serif;color:var(--muted);font-size:15px;margin-bottom:6px}
  .result .verdict{font-size:15px;font-weight:600;margin:10px 0 18px}
  .achieve{
    background:linear-gradient(160deg,#fffaf0,#fdf3e3);
    border:1px solid var(--line);border-radius:18px;
    padding:22px 18px 20px;margin:0 0 22px;
    box-shadow:inset 0 1px 0 #fff;
  }
  .achieve-icon{
    font-size:64px;line-height:1;
    animation:pop .55s cubic-bezier(.18,1.5,.4,1) both;
  }
  @keyframes pop{0%{transform:scale(.2);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
  .achieve-msg{
    font-family:'Prompt',sans-serif;font-weight:700;font-size:19px;
    margin-top:12px;color:var(--ink);line-height:1.35;
  }
  .achieve-sub{
    font-size:13.5px;color:var(--muted);margin-top:7px;line-height:1.5;
  }
  .review{
    text-align:left;border-top:1px dashed var(--line);padding-top:16px;margin-top:4px;
  }
  .review h3{
    font-family:'Prompt',sans-serif;font-size:12px;font-weight:600;
    letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;
  }
  .miss{
    display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);
  }
  .miss:last-child{border-bottom:none}
  .miss .mth{font-family:'Prompt',sans-serif;font-weight:500;font-size:24px;min-width:64px}
  .miss .mbody{flex:1;font-size:13px;line-height:1.5}
  .miss .mbody .you{color:var(--bad)}
  .miss .mbody .cor{color:var(--good);font-family:'Prompt',sans-serif;font-weight:600}
  .miss .mbody .jp{color:var(--muted)}
  .miss .mbody .rv-th{font-family:'Sarabun',sans-serif;font-weight:600;font-size:17px;margin-left:4px}
  .miss .mbody .you-th{color:var(--bad)}
  .miss .mbody .cor-th{color:var(--good)}
  .perfect{font-size:15px;color:var(--good);font-weight:600;padding:8px 0}
  .again{
    width:100%;margin-top:22px;border:none;cursor:pointer;
    font-family:'Prompt',sans-serif;font-weight:600;font-size:16px;
    color:#fff;background:var(--coral);border-radius:14px;padding:16px;
  }
  .again:hover{filter:brightness(.95)}
  footer{text-align:center;margin-top:22px;font-size:11px;color:var(--muted);line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <span class="eyebrow">Thai Reading</span>
      <span class="ttl">Loopless Font Master</span>
    </div>
    <span class="badge" id="poolBadge">Powered by Moonoi Monsoon</span>
  </header>

  <!-- QUIZ -->
  <section id="quiz">
    <div class="stats">
      <div class="stat"><div class="k">Question</div><div class="v"><span id="qnum">1</span><small>/10</small></div></div>
      <div class="stat" id="streakStat"><div class="k">Streak</div><div class="v" id="streak">0</div></div>
      <div class="stat" id="scoreStat"><div class="k">Score</div><div class="v" id="score">0</div></div>
    </div>
    <div class="track"><i id="bar"></i></div>

    <div class="qcard">
      <div class="prompt-label">How do you read this?</div>
      <div class="thai" id="thai">—</div>
      <div class="jp-hint" id="jp"></div>
      <div class="choices" id="choices"></div>
      <div class="feedback" id="feedback"></div>
      <button class="next" id="next" disabled>Next →</button>
    </div>
  </section>

  <!-- RESULT -->
  <section id="resultScreen" style="display:none">
    <div class="result">
      <h2>Quiz complete</h2>
      <div class="big" id="finalScore">0</div>
      <div class="pct" id="finalPct">0 / 10 · 0%</div>
      <div class="verdict" id="verdict"></div>
      <div class="achieve" id="achieve">
        <div class="achieve-icon" id="achieveIcon">🍋</div>
        <div class="achieve-msg" id="achieveMsg"></div>
        <div class="achieve-sub" id="achieveSub"></div>
      </div>
      <div class="review" id="review"></div>
      <button class="again" id="again">Play again</button>
    </div>
  </section>

  <footer>
    Loopless script reading · tell confusable letters apart<br>
    Pronunciation: mid (a) · low (à) · falling (â) · high (á) · rising (ă)
  </footer>
</div>

for(const k in CONFUSE_MAP){ CONFUSE[k] = new Set(CONFUSE_MAP[k]); }

// How visually confusable is `cand`'s spelling against `target` in loopless type?
function confuseScore(target, cand){
  if(cand.th===target.th) return -1;
  const ta=[...target.th], ca=[...cand.th];
  let s=0;
  s -= Math.abs(ta.length-ca.length)*2;          // similar length = more confusing
  const setA=new Set(ta), setC=new Set(ca);
  for(const c of setA) if(setC.has(c)) s+=2;      // shared exact letters
  for(const c of setA){                            // confusable-pair overlap
    const twins=CONFUSE[c];
    if(twins){ for(const t of twins) if(setC.has(t)){ s+=3; break; } }
  }
  if(ta[0]===ca[0]) s+=4;                          // same first letter = deceptive
  else if(CONFUSE[ta[0]]&&CONFUSE[ta[0]].has(ca[0])) s+=5; // confusable onset = very deceptive
  return s;
}

/* ====== Build one question ====== */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function makeDistractors(correct, pool){
  // rank all other real words by loopless-confusability, take a top slice,
  // then pick from it with a little randomness so quizzes vary.
  const scored = pool
    .filter(w=>w.th!==correct.th && w.rd!==correct.rd)
    .map(w=>({w, s:confuseScore(correct,w)}))
    .sort((a,b)=>b.s-a.s);
  const topPool = shuffle(scored.slice(0, 12)).map(x=>x.w); // best 12, shuffled
  const out=[]; const seen=new Set([correct.rd]);
  for(const w of topPool){
    if(out.length>=N_CHOICES-1) break;
    if(!seen.has(w.rd)){ seen.add(w.rd); out.push(w.rd); }
  }
  // safety fill (rarely needed) with any remaining real words
  if(out.length<N_CHOICES-1){
    for(const x of shuffle(scored).map(s=>s.w)){
      if(out.length>=N_CHOICES-1) break;
      if(!seen.has(x.rd)){ seen.add(x.rd); out.push(x.rd); }
    }
  }
  return out.slice(0,N_CHOICES-1);
}

/* ====== Quiz state ====== */
let questions=[], qi=0, score=0, streak=0, bestStreak=0, locked=false, misses=[];

function buildQuiz(){
  const picks = shuffle(VOCAB).slice(0, N_Q);
  questions = picks.map(w=>{
    const distractors = makeDistractors(w, VOCAB);
    const choices = shuffle([w.rd, ...distractors]);
    return {w, choices, answer:w.rd};
  });
  qi=0; score=0; streak=0; bestStreak=0; misses=[];
}

/* ====== Render ====== */
const $=id=>document.getElementById(id);
const LETTERS=['A','B','C','D'];

function renderQ(){
  locked=false;
  const q=questions[qi];
  $('qnum').textContent=qi+1;
  $('score').textContent=score;
  $('streak').textContent=streak;
  $('bar').style.width=((qi)/N_Q*100)+'%';
  $('thai').textContent=q.w.th;
  const jp=$('jp'); jp.textContent=q.w.en; jp.classList.remove('show');
  const fb=$('feedback'); fb.className='feedback'; fb.textContent='';
  $('next').disabled=true;
  $('next').textContent = (qi===N_Q-1)?'See results →':'Next →';

  const box=$('choices'); box.innerHTML='';
  q.choices.forEach((c,i)=>{
    const b=document.createElement('button');
    b.className='choice';
    const looped = RD2TH[c] || '';
    b.innerHTML=`<span class="dot">${LETTERS[i]}</span>`
      +`<span class="ctxt">${c}</span>`
      +`<span class="looped" aria-hidden="true">${looped}</span>`;
    b.onclick=()=>pick(b,c,q);
    box.appendChild(b);
  });
}

function pick(btn, choice, q){
  if(locked) return;
  locked=true;
  const correct = choice===q.answer;
  const fb=$('feedback');
  $('jp').classList.add('show'); // reveal meaning as part of explanation

  document.querySelectorAll('.choice').forEach(el=>{
    el.classList.add('locked');
    const txt=el.querySelector('.ctxt').textContent;
    if(txt===q.answer){
      el.classList.add('correct');
      el.querySelector('.looped').classList.add('show'); // reveal looped form on the answer
    } else if(el===btn){
      el.classList.add('wrong');
      el.querySelector('.looped').classList.add('show'); // and on the wrong pick
    } else {
      el.classList.add('dim');
    }
  });

  if(correct){
    score++; streak++;
    if(streak>bestStreak) bestStreak=streak;
    fb.className='feedback show ok';
    fb.innerHTML=`✓ Correct — <span class="ans">${q.answer}</span> <span class="fb-th">${RD2TH[q.answer]||''}</span>`;
  }else{
    streak=0;
    fb.className='feedback show no';
    fb.innerHTML=`✗ Answer: <span class="ans">${q.answer}</span> <span class="fb-th">${RD2TH[q.answer]||''}</span>`;
    misses.push({th:q.w.th, you:choice, youTh:RD2TH[choice]||'', cor:q.answer, corTh:RD2TH[q.answer]||'', en:q.w.en});
  }
  $('score').textContent=score;
  $('streak').textContent=streak;
  $('next').disabled=false;
}

$('next').onclick=()=>{
  if(qi<N_Q-1){ qi++; renderQ(); }
  else showResult();
};

function showResult(){
  $('quiz').style.display='none';
  $('resultScreen').style.display='block';
  $('bar').style.width='100%';
  const pct=Math.round(score/N_Q*100);
  $('finalScore').textContent=score;
  $('finalPct').textContent=`${score} / ${N_Q} · ${pct}%`;
  let v;
  if(pct===100) v='Flawless — you read every loopless letter right.';
  else if(pct>=80) v='Strong run — the loopless shapes are clicking.';
  else if(pct>=50) v='Good progress — keep telling the lookalike letters apart.';
  else v='Keep drilling — focus on the confusable letter shapes.';
  $('verdict').textContent=v;

  /* ---- Achievement based on BEST STREAK as a share of total questions ----
     ≤40% → yuzu · >40% and <90% → sakura · ≥90% → fireworks                */
  const streakPct = bestStreak / N_Q;   // 0..1, works for any quiz length
  let icon, msg, sub;
  if(streakPct <= 0.40){
    icon='🍋';
    msg='Fresh start, like a yuzu';
    sub=`Your best run was ${bestStreak} in a row. Every master starts here — line up two, then three. Come back and grow that streak!`;
  } else if(streakPct < 0.90){
    icon='🌸';
    msg='In full bloom, like sakura';
    sub=`A best streak of ${bestStreak} straight — your eye for the loopless shapes is blossoming. One more round and the petals turn to fireworks. 🌸`;
  } else {
    icon='🎆';
    msg='Fireworks! A true Loopless Font Master';
    sub=`${bestStreak} correct in a row — dazzling. The loopless letters hold no secrets from you now. Can you do it again? 🎆`;
  }
  $('achieveIcon').textContent=icon;
  $('achieveMsg').textContent=msg;
  $('achieveSub').textContent=sub;
  // restart the pop animation each time
  const ai=$('achieveIcon'); ai.style.animation='none'; void ai.offsetWidth; ai.style.animation='';

  const rev=$('review');
  if(misses.length===0){
    rev.innerHTML='<div class="perfect">No mistakes — nothing to review. 🎉</div>';
  }else{
    let h='<h3>Review · '+misses.length+' missed</h3>';
    misses.forEach(m=>{
      h+=`<div class="miss">
        <div class="mth">${m.th}</div>
        <div class="mbody">
          <div>You: <span class="you">${m.you}</span> <span class="rv-th you-th">${m.youTh||''}</span></div>
          <div>Correct: <span class="cor">${m.cor}</span> <span class="rv-th cor-th">${m.corTh||''}</span></div>
          <div class="jp">${m.en}</div>
        </div>
      </div>`;
    });
    rev.innerHTML=h;
  }
}

$('again').onclick=()=>{
  $('resultScreen').style.display='none';
  $('quiz').style.display='block';
  buildQuiz(); renderQ();
};

/* init */
buildQuiz(); renderQ();
</script>
</body>
</html>
